format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

workflows:
  test-git-clone:
    title: Activate git-clone via steplib v2
    description: |-
      Single-step workflow used by bitrise_specv2.yml to drive the steplib v2
      activation path end-to-end.
    steps:
    - git-clone@8.4:
        run_if: "true"
        inputs:
        - repository_url: https://github.com/bitrise-io/stepman
        - branch: master
        - clone_into_dir: $BITRISE_SOURCE_DIR/_tmp/specv2-clone
