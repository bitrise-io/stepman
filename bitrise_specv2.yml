format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

# End-to-end test for the steplib v2 activation path, driven by the real
# bitrise CLI built against this stepman checkout.
#
# The orchestrator below:
#   1. Clones github.com/bitrise-io/bitrise, rewires its go.mod with a
#      `replace github.com/bitrise-io/stepman => <this repo>` directive,
#      and builds the CLI to a temp path.
#   2. Runs `_tests/specv2/test_workflow.yml` through the CLI. Step metadata is
#      resolved from the hosted V2 inventory at $V2_INVENTORY_URL (the
#      workflow's default_step_lib_source); the precompiled binary is
#      downloaded from steplib.bitrise.io (the default storage URL), so this
#      exercises HTTPAPI + precompiled-binary download + SHA256 verify against
#      real, hosted infrastructure.
#
# Invoke with:
#   bitrise run --config bitrise_specv2.yml test-specv2

app:
  envs:
  - STEPMAN_DIR: $BITRISE_SOURCE_DIR
  - V2_INVENTORY_URL: https://storage.googleapis.com/steplib-storage-dev
  - BITRISE_SRC: /tmp/bitrise-src
  - BITRISE_BIN: /tmp/bitrise-specv2-bin

workflows:
  test-specv2:
    title: End-to-end steplib v2 test via real bitrise CLI
    steps:
    - script:
        title: Clone bitrise + replace stepman + build CLI
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            if [ ! -d "$BITRISE_SRC/.git" ]; then
                git clone --depth=1 https://github.com/bitrise-io/bitrise.git "$BITRISE_SRC"
            else
                git -C "$BITRISE_SRC" fetch --depth=1 origin master
                git -C "$BITRISE_SRC" reset --hard origin/master
            fi
            cd "$BITRISE_SRC"
            # Drop any earlier replace + retarget at this stepman checkout.
            go mod edit -dropreplace=github.com/bitrise-io/stepman || true
            go mod edit -replace=github.com/bitrise-io/stepman="$STEPMAN_DIR"
            # bitrise upstream uses vendoring; resync the vendor tree after edits.
            go mod tidy
            go mod vendor
            go build -o "$BITRISE_BIN" .
            "$BITRISE_BIN" --version
    - script:
        title: Run test workflow against hosted V2 inventory
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            cd "$STEPMAN_DIR"
            # Enable the precompiled-binary download path; the binary is fetched
            # from steplib.bitrise.io (the default storage URL).
            export BITRISE_EXPERIMENT_PRECOMPILED_STEPS=true
            "$BITRISE_BIN" run \
                --config "$STEPMAN_DIR/_tests/specv2/test_workflow.yml" \
                test-git-clone
