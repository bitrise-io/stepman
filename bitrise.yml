format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

# Go is provisioned natively by the Bitrise CLI before the first Step of each
# Workflow, replacing the previous asdf + .tool-versions setup.
tools:
  golang: 1.25.7

app:
  envs:
  - BIN_NAME: stepman

workflows:
  test:
    title: Runs tests
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git:
        inputs:
        - workflow: lint
        - skip_step_yml_validation: "yes"
        - skip_go_checks: "yes"
    - go-list: { }
    - script:
        title: golangci-lint
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            INSTALL_DIR=$(go env GOPATH)/bin

            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$INSTALL_DIR" v2.6.0
            "$INSTALL_DIR"/golangci-lint run --config .golangci.yml
    - go-test: { }
    - script:
        title: Run integration tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            current_stepman="$(pwd)/_tmp/test_stepman"
            export CGO_ENALBED=0
            go build -o "$current_stepman"

            export PR="" PULL_REQUEST_ID=""
            export INTEGRATION_TEST_BINARY_PATH="$current_stepman"
            go test -v ./_tests/integration/...

  test-specv2:
    title: Runs the steplib v2 end-to-end test
    description: |-
      Delegates to bitrise_specv2.yml: generates a V2 inventory from a
      bitrise-steplib clone, serves it locally, builds the bitrise CLI against
      this stepman checkout, and activates a step through the v2 HTTPAPI +
      precompiled-binary path. Kept out of the default `test` workflow because
      it clones and builds the bitrise CLI.
    steps:
    - script:
        title: Run steplib v2 e2e via real bitrise CLI
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            bitrise run --config bitrise_specv2.yml test-specv2

  create-release:
    description: Creates Linux and Darwin binaries, then publishes a GitHub release
    envs:
    # Goreleaser expects this env var
    - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
    - script:
        title: Goreleaser (create binaries + publish to GH)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: goreleaser release

  test-binary-build:
    description: Tests the release build process by creating a snapshot release (without publishing)
    steps:
    - script:
        title: Goreleaser (create snapshot binaries)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex
            goreleaser release --snapshot --clean
