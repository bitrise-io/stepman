format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

app:
  envs:
  - BIN_NAME: stepman

step_bundles:
  setup-go:
    steps:
    - script:
        title: Setup pinned Go version
        inputs:
        - content: asdf install

workflows:
  test:
    title: Runs tests
    steps:
    - bundle::setup-go: {}
    # steps-check is in a different GitHub org, so the modular `include:` mechanism
    # can't reach it. Instead we run its step, which embeds a wrapper bitrise.yml and
    # runs the requested shared workflow (steps-check defaults to master).
    - git::https://github.com/bitrise-steplib/steps-check.git:
        title: yamlfmt
        inputs:
        - workflow: yamlfmt
        # Exclude test fixtures: yamlfmt rewrites files in place, and reformatting
        # these would change bytes the tests assert on (e.g. step-info golden output).
        - yamlfmt_exclude: _tmp/**,.bitrise.secrets.yml,.git/**,.github/**,vendor/**,internal/specfixtures/testdata/**,_tests/**
    - git::https://github.com/bitrise-steplib/steps-check.git:
        title: golangci-lint
        inputs:
        - workflow: golangci-lint
        - golangci_lint_version: 2.11.4
        # Lint with this repo's own config (incl. exhaustruct) instead of the
        # shared steps-check one.
        - golangci_lint_config_file: .golangci.yml
    - go-test:
        inputs:
        - packages: ./...
    - script:
        title: Run integration tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            current_stepman="$(pwd)/_tmp/test_stepman"
            export CGO_ENALBED=0
            go build -o "$current_stepman"

            export PR="" PULL_REQUEST_ID=""
            export INTEGRATION_TEST_BINARY_PATH="$current_stepman"
            go test -v ./_tests/integration/...

  create-release:
    description: Creates Linux and Darwin binaries, then publishes a GitHub release
    envs:
    # Goreleaser expects this env var
    - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
    - bundle::setup-go: {}
    - script:
        title: Goreleaser (create binaries + publish to GH)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: goreleaser release

  test-binary-build:
    description: Tests the release build process by creating a snapshot release (without publishing)
    steps:
    - bundle::setup-go: {}
    - script:
        title: Goreleaser (create snapshot binaries)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex
            goreleaser release --snapshot --clean
