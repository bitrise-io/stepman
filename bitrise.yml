format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

app:
  envs:
  - BIN_NAME: stepman

step_bundles:
  setup-go:
    steps:
    - script:
        title: Setup pinned Go version
        inputs:
        # - content: asdf install

workflows:
  test:
    title: Runs tests
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git:
        inputs:
        - workflow: lint
        - skip_step_yml_validation: "yes"
        - skip_go_checks: "yes"
    - bundle::setup-go: { }
    - go-list: { }
    - script:
        title: golangci-lint
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            INSTALL_DIR=$(go env GOPATH)/bin

            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$INSTALL_DIR" v2.6.0
            asdf reshim golang
            "$INSTALL_DIR"/golangci-lint run --config .golangci.yml
    - go-test:
        inputs:
        - packages: ./...
    - script:
        title: Run integration tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            current_stepman="$(pwd)/_tmp/test_stepman"
            export CGO_ENALBED=0
            go build -o "$current_stepman"

            export PR="" PULL_REQUEST_ID=""
            export INTEGRATION_TEST_BINARY_PATH="$current_stepman"
            go test -v ./_tests/integration/...

            # Generator round-trip against a real steplib (build-tag gated, needs network).
            go test -tags integration -v ./steplibrary/indexgen/...

  e2e-invalid-step-id:
    description: |-
      End-to-end check of how v1 stepman handles invalid/non-existent step IDs.
      Builds the binary, sets up the default steplib, then asserts that bad
      step IDs fail with a non-zero exit code and a clear message (no panic,
      no silent success).
    steps:
    - bundle::setup-go: { }
    - script:
        title: Build stepman + exercise invalid step IDs
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail

            stepman="$(pwd)/_tmp/test_stepman"
            steplib="https://github.com/bitrise-io/bitrise-steplib.git"

            CGO_ENABLED=0 go build -o "$stepman"

            "$stepman" setup --collection "$steplib"

            # expect_failure <description> -- <command...>
            # Runs the command, captures combined output, and fails the build
            # unless the command exits non-zero. Echoes the output either way so
            # the actual v1 error message is visible in the build log.
            expect_failure() {
              local desc="$1"; shift
              [ "$1" = "--" ] && shift

              echo "=== $desc"
              echo "    \$ $*"
              local out status
              set +e
              out="$("$@" 2>&1)"
              status=$?
              set -e
              echo "$out"

              if [ "$status" -eq 0 ]; then
                echo "FAIL: expected a non-zero exit code, got 0"
                return 1
              fi
              echo "    -> exit code $status (OK)"
              echo
            }

            # A step ID that does not exist in the collection.
            expect_failure "step-info, non-existent id" -- \
              "$stepman" step-info --collection "$steplib" --id this-step-does-not-exist-xyz --version 1.0.0
            expect_failure "download, non-existent id" -- \
              "$stepman" download --collection "$steplib" --id this-step-does-not-exist-xyz --version 1.0.0
            expect_failure "step-info, non-existent id, latest version" -- \
              "$stepman" step-info --collection "$steplib" --id this-step-does-not-exist-xyz

            # An existing step at a version that does not exist.
            expect_failure "step-info, valid id, non-existent version" -- \
              "$stepman" step-info --collection "$steplib" --id script --version 999.999.999

            # Malformed step IDs (path traversal / separators / empty).
            expect_failure "step-info, path-traversal id" -- \
              "$stepman" step-info --collection "$steplib" --id ../../etc/passwd --version 1.0.0
            expect_failure "step-info, id with slash" -- \
              "$stepman" step-info --collection "$steplib" --id foo/bar --version 1.0.0
            expect_failure "step-info, empty id" -- \
              "$stepman" step-info --collection "$steplib" --id ""

            echo "All invalid step IDs were rejected with a non-zero exit code."

  create-release:
    description: Creates Linux and Darwin binaries, then publishes a GitHub release
    envs:
    # Goreleaser expects this env var
    - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
    - bundle::setup-go: { }
    - script:
        title: Goreleaser (create binaries + publish to GH)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: goreleaser release

  test-binary-build:
    description: Tests the release build process by creating a snapshot release (without publishing)
    steps:
    - bundle::setup-go: { }
    - script:
        title: Goreleaser (create snapshot binaries)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex
            goreleaser release --snapshot --clean
